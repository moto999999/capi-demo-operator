# This rule is not used by the project capi-demo-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over infrastructure.capi.demo.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: capi-demo-operator
    app.kubernetes.io/managed-by: kustomize
  name: machinepool-admin-role
rules:
- apiGroups:
  - infrastructure.capi.demo
  resources:
  - machinepools
  verbs:
  - '*'
- apiGroups:
  - infrastructure.capi.demo
  resources:
  - machinepools/status
  verbs:
  - get
