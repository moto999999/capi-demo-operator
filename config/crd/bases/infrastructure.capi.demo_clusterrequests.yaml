---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: clusterrequests.infrastructure.capi.demo
spec:
  group: infrastructure.capi.demo
  names:
    kind: ClusterRequest
    listKind: ClusterRequestList
    plural: clusterrequests
    singular: clusterrequest
  scope: Namespaced
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: ClusterRequest is the Schema for the clusterrequests API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of ClusterRequest
            properties:
              controlPlane:
                description: |-
                  ControlPlane describes the control plane configuration
                  Similar to ControlPlaneMachineSet in OCP
                properties:
                  machineType:
                    description: MachineType is a fake "instance type" — like AWS
                      m5.xlarge in IPI
                    enum:
                    - small
                    - medium
                    - large
                    type: string
                  replicas:
                    description: Replicas is always 1 or 3 in real clusters (etcd
                      quorum)
                    enum:
                    - 1
                    - 3
                    format: int32
                    type: integer
                required:
                - machineType
                - replicas
                type: object
              version:
                description: |-
                  Version is the Kubernetes version for this cluster
                  e.g. "1.34.3" — like ClusterVersion in OCP
                pattern: ^\d+\.\d+\.\d+$
                type: string
              workers:
                description: |-
                  Workers describes the worker machine pools
                  Similar to MachineSets in OCP — we can have multiple worker machine pools, each with its own configuration
                items:
                  properties:
                    machineType:
                      description: MachineType is the fake instance type for workers
                      enum:
                      - small
                      - medium
                      - large
                      type: string
                    name:
                      description: Name identifies this pool — like a MachineSet name
                        in OCP
                      type: string
                    replicas:
                      default: 1
                      description: Replicas is the desired number of worker nodes
                      format: int32
                      type: integer
                  required:
                  - machineType
                  - name
                  - replicas
                  type: object
                minItems: 1
                type: array
            required:
            - controlPlane
            - version
            - workers
            type: object
          status:
            description: status defines the observed state of ClusterRequest
            properties:
              conditions:
                description: Conditions is the standard Kubernetes conditions array
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              controlPlaneReady:
                description: ControlPlaneReady mirrors what you see on Cluster.status.controlPlaneReady
                  in CAPI
                type: boolean
              phase:
                description: |-
                  Phase is the high-level lifecycle state
                  Similar to the "phase" field on a Machine object in OCP
                enum:
                - Pending
                - Provisioning
                - Ready
                - Failed
                - Deleting
                type: string
              readyWorkers:
                description: |-
                  ReadyWorkers is how many worker Machines are Ready
                  Similar to checking MachineSet .status.readyReplicas
                format: int32
                type: integer
              totalWorkers:
                description: TotalWorkers is the sum of desired replicas across all
                  pools
                format: int32
                type: integer
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
